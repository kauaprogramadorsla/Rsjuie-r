<!DOCTYPE html>
<html>
<head>
<title>Votação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("https://i.ibb.co/mCBrxzgs/Untitled770-20260214172706.png") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

h1, h2, p {
    text-shadow: 0 2px 5px rgba(0,0,0,0.7);
}

.topo {
    display: flex;
    gap: 15px;
    padding: 10px;
    overflow-x: auto;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
}

.topo button {
    min-width: 160px;
    padding: 15px 20px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
}

.conteudo {
    padding: 20px;
    text-align: center;
}

.area-votacao {
    display: none;
}

.opcoes {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 600px;
    margin: auto;
}

.botao-voto {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    height: 110px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    color: black;
    background: white;
    transition: 0.2s;
}

.botao-voto img {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
}

.botao-voto.selecionado {
    outline: 4px solid #6b3e2e;
}

.confirmar {
    margin-top: 25px;
    padding: 10px 20px;
    border-radius: 20px;
    background: white;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: black;
    font-weight: bold;
}

.bola {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: gray;
    transition: 0.2s;
}

.bola.ativa {
    background: limegreen;
}

.tela-confirmacao {
    display: none;
    text-align: center;
    padding: 40px 20px;
}

.cartao-confirmacao {
    background: white;
    color: black;
    border-radius: 20px;
    padding: 20px;
    max-width: 400px;
    margin: auto;
}

.cartao-confirmacao img {
    width: 120px;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
}

.btn-voltar {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
}

.codigo-container {
    margin-top: 20px;
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="topo">
    <button onclick="abrirVotacao()">Votação</button>
</div>

<div class="conteudo area-votacao" id="areaVotacao">
    <h1>Vote quem deve ir pra próxima fase</h1>

    <div class="opcoes">

        <button class="botao-voto" onclick="selecionar(this,'millie')">
            <img src="https://i.ibb.co/Z9DMC2S/Untitled766-20260301204421.png">
            millie
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Magnata')">
            <img src="https://i.ibb.co/G4YTtX8v/Untitled766-20260301204626.png">
            Magnata
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Luiza')">
            <img src="https://i.ibb.co/HTYfN3nm/Untitled766-20260301204705.png">
            Luiza
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Claubs')">
            <img src="https://i.ibb.co/20Wq0bkT/Untitled766-20260301204832.png">
            Claubs
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Pepsi')">
            <img src="https://i.ibb.co/8pKkVxY/Untitled766-20260301204910.png">
            Pepsi
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Ana mary')">
            <img src="https://i.ibb.co/WpHMHRXs/Untitled766-20260301204851.png">
            Ana mary
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Gaby e soso')">
            <img src="https://i.ibb.co/KjtMx74r/Untitled766-20260301205002.png">
            Gaby e soso
        </button>

        <button class="botao-voto" onclick="selecionar(this,'Lily')">
            <img src="https://i.ibb.co/gLJq430q/Untitled766-20260301204932.png">
            Lily
        </button>

    </div>

    <div class="confirmar" onclick="confirmarVoto()">
        <div class="bola" id="bola"></div>
        Confirmar voto
    </div>

    <div class="codigo-container">
        <input type="text" id="codigoInput" placeholder="Código">
        <button onclick="verificarCodigo()">Ver Resultados</button>
    </div>

    <h2>Resultados:</h2>
    <p id="resultado"></p>
</div>

<div class="tela-confirmacao" id="telaConfirmacao">
    <div class="cartao-confirmacao">
        <img id="fotoConfirmacao">
        <h2 id="nomeConfirmacao"></h2>
    </div>
    <button class="btn-voltar" onclick="voltarVotacao()">Votar novamente</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyC8PSXTyOxn_kgyFzpn-Qw3EGUXdS7BGOo",
    authDomain: "feature-8e659.firebaseapp.com",
    databaseURL: "https://feature-8e659-default-rtdb.firebaseio.com",
    projectId: "feature-8e659",
    storageBucket: "feature-8e659.firebasestorage.app",
    messagingSenderId: "755676249847",
    appId: "1:755676249847:web:2a01bda6f99d6e32b7ddf2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const participantes = [
"millie","Magnata","Luiza","Claubs",
"Pepsi","Ana mary","Gaby e soso","Lily"
];

let votoSelecionado=null;
let fotoSelecionada=null;

window.abrirVotacao=()=>{
document.getElementById("areaVotacao").style.display="block";
};

window.selecionar=(botao,nome)=>{
document.querySelectorAll(".botao-voto").forEach(b=>b.classList.remove("selecionado"));
botao.classList.add("selecionado");
votoSelecionado=nome;
fotoSelecionada=botao.querySelector("img").src;
};

async function votar(nome){
const votoRef=ref(db,"votos/"+nome);
const snap=await get(votoRef);
let total=snap.exists()?snap.val():0;
await set(votoRef,total+1);
}

window.confirmarVoto=async()=>{
if(!votoSelecionado) return;
document.getElementById("bola").classList.add("ativa");
setTimeout(async()=>{
await votar(votoSelecionado);
document.getElementById("areaVotacao").style.display="none";
document.getElementById("telaConfirmacao").style.display="block";
document.getElementById("fotoConfirmacao").src=fotoSelecionada;
document.getElementById("nomeConfirmacao").innerText=votoSelecionado;
},400);
};

window.voltarVotacao=()=>{
document.getElementById("telaConfirmacao").style.display="none";
document.getElementById("areaVotacao").style.display="block";
document.getElementById("bola").classList.remove("ativa");
document.querySelectorAll(".botao-voto").forEach(b=>b.classList.remove("selecionado"));
votoSelecionado=null;
};

window.verificarCodigo=async()=>{
const codigo=document.getElementById("codigoInput").value;
if(codigo!=="736943"){
document.getElementById("resultado").innerText="Código incorreto!";
return;
}
const snap=await get(ref(db,"votos"));
let dados=snap.exists()?snap.val():{};
participantes.forEach(p=>{if(!dados[p]) dados[p]=0;});
const ordenado=Object.entries(dados).sort((a,b)=>b[1]-a[1]);
let texto="";
ordenado.forEach(item=>{
texto+=item[0]+": "+item[1]+" votos<br>";
});
document.getElementById("resultado").innerHTML=texto;
};
</script>

</body>
</html>
